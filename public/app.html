<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Login</title>
<link rel="stylesheet" href="/styles.css" />
<style>
body{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}
.card{
    width:350px;
}
</style>
</head>

<body>

<div class="card">
    <h2 style="margin-bottom:20px">Admin Login</h2>

    <input id="user" placeholder="username" style="width:100%;margin-bottom:10px" />
    <input id="pass" type="password" placeholder="password" style="width:100%;margin-bottom:10px" />

    <button id="loginBtn" style="width:100%">Login</button>

    <div id="err" style="color:red;margin-top:10px"></div>
</div>

<script>

document.getElementById("loginBtn").onclick = async () => {

    const username = document.getElementById("user").value
    const password = document.getElementById("pass").value

    const r = await fetch("/api/login",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username,
            password
        })
    })

    const j = await r.json()

    if(j.ok){
        location.href="/dashboard.html"
    }else{
        document.getElementById("err").innerText="Login failed"
    }

}

</script>

</body>
</html>
