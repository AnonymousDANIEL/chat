<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Login</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="container">
    <div class="card" style="max-width:520px;margin:80px auto;">
        <div class="title">Login</div>
        <div class="small">Demo: admin / 123456</div>
        <div class="hr"></div>
        <div id="err" class="small" style="color:#ff6b6b;display:none;margin-bottom:10px;"></div>
        <div class="row" style="flex-direction:column;align-items:stretch">
            <input id="u" placeholder="username" value="admin" />
            <input id="p" placeholder="password" type="password" value="123456" />
            <button id="btn">Login</button>
        </div>
    </div>
</div>
<script src="/login.js"></script>
</body>
</html>
